<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Web-site home structure v1</title>
<style>
  :root {
    --paper: #fff;
    --ink: #111;
    --muted: #777;
    --rule: #e2e2de;
    --highlight: #f7d133;
    --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #2a2a28; color: var(--ink); }
  body { font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  .lock {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 28px;
  }
  .panel {
    width: min(520px, 100%);
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 34px;
    box-shadow: 0 24px 80px rgba(0,0,0,.22);
  }
  .eyebrow {
    font: 12px var(--mono);
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 36px;
    line-height: 1.05;
    letter-spacing: -.03em;
  }
  .accent { background: var(--highlight); padding: 0 6px; }
  p { margin: 0 0 24px; color: #444; line-height: 1.5; }
  label {
    display: block;
    font: 12px var(--mono);
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .row { display: flex; gap: 10px; }
  input {
    flex: 1;
    min-width: 0;
    height: 46px;
    border: 1px solid #cfcfc9;
    border-radius: 4px;
    padding: 0 14px;
    font: 16px var(--sans);
  }
  button {
    height: 46px;
    border: 1px solid var(--ink);
    border-radius: 4px;
    background: var(--ink);
    color: var(--highlight);
    padding: 0 18px;
    font: 700 14px var(--sans);
    cursor: pointer;
  }
  .error {
    min-height: 20px;
    margin-top: 12px;
    color: #a33;
    font: 12px var(--mono);
  }
  .note {
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    color: var(--muted);
    font: 12px/1.45 var(--mono);
  }
  @media (max-width: 560px) {
    .panel { padding: 24px; }
    .row { flex-direction: column; }
    h1 { font-size: 30px; }
  }
</style>
</head>
<body>
<main class="lock">
  <section class="panel">
    <div class="eyebrow">Protected build</div>
    <h1>Web-site home <span class="accent">structure v1</span></h1>
    <p>Enter the password to unlock the presentation and wireframe preview.</p>
    <form id="unlockForm">
      <label for="password">Password</label>
      <div class="row">
        <input id="password" type="password" autocomplete="current-password" autofocus />
        <button id="unlockBtn" type="submit">Unlock</button>
      </div>
      <div class="error" id="error" role="alert"></div>
    </form>
    <div class="note">The page payload is encrypted in this file and is decrypted locally in your browser after the password is entered.</div>
  </section>
</main>

  var form = document.getElementById('unlockForm');
  var input = document.getElementById('password');
  var button = document.getElementById('unlockBtn');
  var error = document.getElementById('error');

  function bytesFromBase64(value) {
    var bin = atob(value);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function unlock(password) {
    var encodedPassword = new TextEncoder().encode(password);
    var keyMaterial = await crypto.subtle.importKey('raw', encodedPassword, 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: bytesFromBase64(payload.salt), iterations: payload.iterations, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    var decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: bytesFromBase64(payload.iv) },
      key,
      bytesFromBase64(payload.data)
    );
    return new TextDecoder().decode(decrypted);
  }

  form.addEventListener('submit', async function (event) {

    error.textContent = '';
    button.disabled = true;
    button.textContent = 'Unlocking...';
    try {
      var html = await unlock(input.value);
      document.open();
      document.write(html);

      button.disabled = false;
      button.textContent = 'Unlock';
