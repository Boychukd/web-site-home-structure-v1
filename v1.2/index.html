<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Web-site home structure v1.2</title>
<style>
  :root {
    --paper: #fff;
    --ink: #111;
    --muted: #777;
    --rule: #e2e2de;
    --highlight: #f7d133;
    --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; background: #2a2a28; color: var(--ink); }
  body { font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  .lock {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 28px;
  }
  .panel {
    width: min(520px, 100%);
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 34px;
    box-shadow: 0 24px 80px rgba(0,0,0,.22);
  }
  .eyebrow {
    font: 12px var(--mono);
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 36px;
    line-height: 1.05;
    letter-spacing: -.03em;
  }
  .accent { background: var(--highlight); padding: 0 6px; }
  p { margin: 0 0 24px; color: #444; line-height: 1.5; }
  label {
    display: block;
    font: 12px var(--mono);
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .row { display: flex; gap: 10px; }
  input {
    flex: 1;
    min-width: 0;
    height: 46px;
    border: 1px solid #cfcfc9;
    border-radius: 4px;
    padding: 0 14px;
    font: 16px var(--sans);
  }
  button {
    height: 46px;
    border: 1px solid var(--ink);
    border-radius: 4px;
    background: var(--ink);
    color: var(--highlight);
    padding: 0 18px;
    font: 700 14px var(--sans);
    cursor: pointer;
  }
  .error {
    min-height: 20px;
    margin-top: 12px;
    color: #a33;
    font: 12px var(--mono);
  }
  .note {
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    color: var(--muted);
    font: 12px/1.45 var(--mono);
  }
  @media (max-width: 560px) {
    .panel { padding: 24px; }
    .row { flex-direction: column; }
    h1 { font-size: 30px; }
  }
</style>
</head>
<body>
<main class="lock">
  <section class="panel">
    <div class="eyebrow">Protected build</div>
    <h1>Web-site home <span class="accent">structure v1.2</span></h1>
    <p>Enter the password to unlock the presentation and wireframe preview.</p>
    <form id="unlockForm">
      <label for="password">Password</label>
      <div class="row">
        <input id="password" type="password" autocomplete="current-password" autofocus />
        <button id="unlockBtn" type="submit">Unlock</button>
      </div>
      <div class="error" id="error" role="alert"></div>
    </form>
    <div class="note">The page payload is encrypted in this file and is decrypted locally in your browser after the password is entered.</div>
  </section>
</main>

        var n = niche.value;
        var budgetScale = b / 10;
        var agencyCreators = Math.max(8, Math.round(12 + (Math.pow(budgetScale, 0.82) - 1) * 6.2));
        var agencyPosts = agencyCreators * 4;
        var agencyRelevant = Math.max(1, Math.round(17 * (1 + (Math.sqrt(budgetScale) - 1) * 0.32)));
        var selectCreators = Math.max(8, Math.round(10 + (Math.pow(budgetScale, 0.9) - 1) * 4 + f * 1.2 - o / 18));
        var selectPosts = selectCreators * 4;
        var reach = Math.max(1, Math.round(reachBase[n] * (1 + (Math.sqrt(budgetScale) - 1) * 0.35) * (1 + (20 - o) / 160) * (1 + (5 - f) * 0.055)));
        var controlledOverlap = Math.max(4, Math.round(o * .6));
        var labels = niches[n];
        var mutedPalette = ['#f04b4b', '#18bdb5', '#ff8c35', '#646ef7', '#ea4fa3', '#39b24e', '#f3c51b', '#2f57ff'];
        var vividPalette = ['#f54848', '#10b7b1', '#ff8040', '#e842a0', '#3ba64c', '#2b55ff', '#5f63f5', '#f3c51b', '#17c46d', '#ff5ca6'];
        var agencyOffset = (n.charCodeAt(0) + b) % 10;
        var selectOffset = (n.charCodeAt(0) + f + o + b) % 10;

        setText('[data-budget-label]', '$' + b + 'K');
        setText('[data-frequency-label]', f + '×');
        setText('[data-overlap-label]', o + '%');
        setText('[data-agency-creators]', String(agencyCreators));
        setText('[data-agency-posts]', String(agencyPosts));
        setText('[data-agency-relevant]', '~' + agencyRelevant + 'K');
        setText('[data-select-creators]', String(selectCreators));
        setText('[data-select-posts]', String(selectPosts));
        setText('[data-select-reach]', reach + 'K');
        setText('[data-select-overlap]', controlledOverlap + '% controlled');
        setText('[data-select-avatar-title]', 'Selected creators (' + selectCreators + ')');

        var bars = calc.querySelectorAll('[data-bar]');
        for (var j = 0; j < bars.length; j++) {
          var bucket = Number(bars[j].getAttribute('data-bar'));
          var active = (f >= 4 && bucket === 4) || (f < 4 && bucket === f);
          bars[j].classList.toggle('is-active', active);
          var fill = bars[j].querySelector('.v11-bar__fill');
          var width = bucket === 4 ? Math.min(96, 24 + f * 10) : Math.max(14, 80 - Math.abs(f - bucket) * 16 - o / 4);
          fill.style.width = width + '%';
        }

        makeAvatars(calc.querySelector('[data-agency-avatars]'), labels, agencyCreators, false, mutedPalette, agencyOffset);
        makeAvatars(calc.querySelector('[data-select-avatars]'), labels.slice(f % labels.length).concat(labels), selectCreators, true, vividPalette, selectOffset + f);
      }

      [budget, niche, frequency, overlap].forEach(function (control) {
        control.addEventListener('input', renderCalculator);
        control.addEventListener('change', renderCalculator);
      });
      renderCalculator();
    }

    var network = targetDocument.querySelector('[data-network]');
    if (network) {
      var demoNiches = ['Prediction Markets', 'DeFi', 'Stablecoins', 'NFTs', 'L2s', 'GameFi', 'Memecoins', 'Onchain Trading'];
      var demoValues = {
        'Prediction Markets': 4800,
        DeFi: 32400,
        Stablecoins: 1200,
        NFTs: 7600,
        L2s: 18300,
        GameFi: 540,
        Memecoins: 22100,
        'Onchain Trading': 11500
      };
      var activeDemoNiche = 'Prediction Markets';
      var demoFilterWrap = network.querySelector('[data-network-filters]');
      var demoValueNode = network.querySelector('[data-network-value]');
      var demoNicheLabel = network.querySelector('[data-network-niche-label]');

      function formatDemoCount(value) {
        if (value >= 1000) return (value / 1000).toFixed(value >= 10000 ? 1 : 1).replace('.0', '') + 'K';
        return String(value);
      }

      function animateDemoNumber(node, nextValue) {
        var startValue = Number(node.getAttribute('data-value') || 0);
        var startedAt = performance.now();
        var duration = 850;
        node.classList.add('is-changing');
        function tick(now) {
          var progress = Math.min(1, (now - startedAt) / duration);
          var eased = 1 - Math.pow(1 - progress, 3);
          var current = Math.round(startValue + (nextValue - startValue) * eased);
          node.textContent = formatDemoCount(current);
          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            node.setAttribute('data-value', String(nextValue));
            node.textContent = formatDemoCount(nextValue);
            window.setTimeout(function () { node.classList.remove('is-changing'); }, 140);
          }
        }
        requestAnimationFrame(tick);
      }

      function renderDemoFilters() {
        demoFilterWrap.innerHTML = '';
        demoNiches.forEach(function (name) {
          var button = targetDocument.createElement('button');
          button.type = 'button';
          button.textContent = name;
          button.setAttribute('aria-pressed', String(name === activeDemoNiche));
          button.addEventListener('click', function () {
            activeDemoNiche = name;
            renderDemoFilters();
            updateDemoValue();
          });
          demoFilterWrap.appendChild(button);
        });
        var more = targetDocument.createElement('span');
        more.textContent = '+ 45 more niches';
        demoFilterWrap.appendChild(more);
      }

      function updateDemoValue() {
        demoNicheLabel.textContent = activeDemoNiche;
        animateDemoNumber(demoValueNode, demoValues[activeDemoNiche]);
      }

      renderDemoFilters();
      updateDemoValue();
    }

    installVersionControls(targetDocument);
  }

  function bytesFromBase64(value) {
    var bin = atob(value);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function unlock(password) {
    var encodedPassword = new TextEncoder().encode(password);
    var keyMaterial = await crypto.subtle.importKey('raw', encodedPassword, 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: bytesFromBase64(payload.salt), iterations: payload.iterations, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    var decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: bytesFromBase64(payload.iv) },
      key,
      bytesFromBase64(payload.data)
    );
    return new TextDecoder().decode(decrypted);
  }

  form.addEventListener('submit', async function (event) {
    event.preventDefault();
    error.textContent = '';
    button.disabled = true;
    button.textContent = 'Unlocking...';
    try {
      var html = await unlock(input.value);
      sessionStorage.setItem(passwordStorageKey, input.value);
      document.open();
      document.write(html);
      document.close();
      installVersionControls(document);
      openWireframeFirst(document);
      window.setTimeout(function () {
        trimV11ToFirstScreen(document);
        installVersionControls(document);
      }, 0);
      new MutationObserver(function () {
        trimV11ToFirstScreen(document);
        installVersionControls(document);
      })
        .observe(document.body, { childList: true, subtree: true });
    } catch (err) {
      error.textContent = 'Wrong password. Please try again.';
      button.disabled = false;
      button.textContent = 'Unlock';
      input.select();
    }
  });

  var savedPassword = sessionStorage.getItem(passwordStorageKey);
  if (savedPassword) {
    input.value = savedPassword;
    form.requestSubmit();
  }
})();
</script>
</body>
</html>
